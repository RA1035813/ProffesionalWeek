services:
  db:
    image: postgres:latest
    container_name: soilsms_db
    environment:
      POSTGRES_USER: mijn_gebruiker
      POSTGRES_PASSWORD: mijn_wachtwoord
      POSTGRES_DB: soilsms_db
    ports:
      - "5433:5432"
    volumes:
      # Link naar het SQL bestand in de LOGS map voor initialisatie
      - ./LOGS/start.sql:/docker-entrypoint-initdb.d/start.sql
    restart: always

  analysis-server:
    build: .
    container_name: soilsms_analysis_server
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - POSTGRES_DB=soilsms_db
      - POSTGRES_USER=mijn_gebruiker
      - POSTGRES_PASSWORD=mijn_wachtwoord
      - USE_LOCAL_AI=true  # Verander naar false als je OpenRouter gebruikt
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - db
    restart: on-failure

  fastapi-server:
    build:
      context: .
      dockerfile: FastAPI/Dockerfile
    container_name: soilsms_fastapi_server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
    restart: on-failure

  sms-receiver:
    build:
      context: .
      dockerfile: sms_send/Dockerfile
    container_name: soilsms_sms_receiver
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
    restart: on-failure

  ngrok:
    image: ngrok/ngrok:latest
    container_name: soilsms_ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "sms-receiver:8080"
    depends_on:
      - sms-receiver
    restart: on-failure

networks:
  default:
    name: soilsms_network
