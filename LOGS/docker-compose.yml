services:
  postgres-db:
    image: postgres:latest
    container_name: soilsms_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soilsms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-soilsms_db}
    ports:
      # Bind to localhost only — not exposed to external network (M10)
      - "127.0.0.1:5433:5432"
    volumes:
      - ./start.sql:/docker-entrypoint-initdb.d/start.sql
